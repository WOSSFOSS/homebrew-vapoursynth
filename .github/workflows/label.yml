name: Label PR on Success (Owner Only)
on:
    workflow_run:
        workflows: ["CI"]
        types:
            - completed

jobs:
    on-success:
        runs-on: ubuntu-latest
        # Check for success AND that the PR author matches your username
        if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.pull_requests[0].user.login == github.repository_owner
        steps:
            - name: Label the PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = context.payload.workflow_run.pull_requests[0].number;

                      github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                        labels: ['pr-pull']
                      });
