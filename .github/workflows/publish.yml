name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled
  workflow_run:
    workflows: ["brew test-bot"]
    types:
      - completed

jobs:
  pr-pull:
    # Combines the auto label PR since that doesn't trigger a pull request target workflow
    if: (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'pr-pull')) || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.pull_requests && github.event.workflow_run.pull_requests[0] && github.event.workflow_run.pull_requests[0].head.repo.id == github.repository_id)
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        env:
          BRANCH: ${{ github.event.pull_request.head.ref || github.event.workflow_run.pull_requests[0].head.ref }}
        run: git push --delete origin "$BRANCH"
